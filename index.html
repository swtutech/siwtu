<script>
/* =====================================================================
   PWA: dynamic manifest + service worker registration + install prompt
   ===================================================================== */
(function setupPWA(){
  const icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%23059669'/%3E%3Cpath d='M278 85L150 298h106v128l106-170h-85z' fill='%23ffffff'/%3E%3C/svg%3E";
  const manifest = {
    name: "SIWTU Airtime & Data",
    short_name: "SIWTU",
    description: "Buy airtime and data instantly.",
    start_url: ".", scope: ".", display: "standalone", orientation: "portrait",
    background_color: "#05070d", theme_color: "#05070d",
    icons: [
      { src: icon, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: icon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestURL = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = manifestURL; document.head.appendChild(link);

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'siwtu-v1';
      self.addEventListener('install', e => { self.skipWaiting(); });
      self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
      self.addEventListener('fetch', e => {
        const req = e.request;
        if (req.method !== 'GET') return;
        e.respondWith(
          fetch(req).then(res => {
            const copy = res.clone();
            caches.open(CACHE).then(c => { try { c.put(req, copy); } catch(_){} });
            return res;
          }).catch(() => caches.match(req).then(r => r || caches.match('./')))
        );
      });
    `;
    try {
      const swBlob = new Blob([swCode], { type: 'text/javascript' });
      const swURL = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL, { scope: './' }).catch(()=>{});
    } catch(e){}
  }

  window.deferredInstallPrompt = null;
  window.appInstalled = false;
  window.installCardDismissed = sessionStorage.getItem('vtu_installDismissed') === '1';

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); window.deferredInstallPrompt = e;
    try {
      if (window.State && State.route === 'profile' && typeof renderProfile === 'function') { renderProfile(); renderTabbar(); }
    } catch(_){}
  });
  window.addEventListener('appinstalled', () => {
    window.appInstalled = true; window.deferredInstallPrompt = null;
    try {
      if (window.State && State.route === 'profile' && typeof renderProfile === 'function') { renderProfile(); renderTabbar(); }
    } catch(_){}
    try { toast('App installed successfully!','ok'); } catch(e){}
  });
})();

/* =====================================================================

function hideSplash(){
  const s = document.getElementById('splash');
  if (!s) return;
  // ensure the splash shows for a minimum professional duration
  s.classList.add('hide');
  setTimeout(()=>{ try{ s.remove(); }catch(_){} }, 650);
}

/* =====================================================================
   PWA: Profile-page install card helpers (Add to Home Screen)

function installCardHTML(){
  const standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  if (window.appInstalled || standalone || window.installCardDismissed) return '';
  return `<div id="installCard" class="mt-4 card rounded-[24px] p-4 relative overflow-hidden fade-in">

      Add to Home Screen

  </div>`;
}
function dismissInstallCard(){
  window.installCardDismissed = true;
  try { sessionStorage.setItem('vtu_installDismissed','1'); } catch(_){}

  if (c){ c.style.opacity = 0; c.style.transform = 'translateY(-8px)'; c.style.transition = '.3s'; setTimeout(()=>c.remove(), 300); }
}
async function triggerInstall(){
  const dp = window.deferredInstallPrompt;
  if (!dp) {
    try { toast('To install: tap your browser menu, then "Add to Home Screen".','info'); }
    catch(e){ alert('To install: tap your browser menu, then "Add to Home Screen".'); }
    return;
  }
  dp.prompt();
  try {
    const { outcome } = await dp.userChoice;
    window.deferredInstallPrompt = null;
    if (outcome === 'accepted') { try { toast('Installing app…','ok'); } catch(e){} }
    dismissInstallCard();
  } catch(_){}
}

/* =====================================================================
   STATE + HELPERS
   ===================================================================== */
const State = {

  user: null, cfg: null, route: 'landing', param: {}, poll: null,
  balHidden: localStorage.getItem('vtu_balHidden') === '1',
};

const app = $('#app');
const peso = n => '₦' + (Number(n)||0).toLocaleString('en-NG', {maximumFractionDigits:2});
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- balance display + hide/show toggle ---------- */
const MASK = '••••••';
function balText(n){ return State.balHidden ? MASK : peso(n); }
function eyeSVG(hidden){
  return hidden
    ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`
    : `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
}
function toggleBalance(){
  State.balHidden = !State.balHidden;
  localStorage.setItem('vtu_balHidden', State.balHidden ? '1' : '0');
  document.querySelectorAll('[data-wallet]').forEach(el=>{ el.textContent = balText(State.user ? State.user.wallet : 0); });
  document.querySelectorAll('[data-eye]').forEach(btn=>{ btn.innerHTML = eyeSVG(State.balHidden); });
}

async function api(action, data={}) {
  const body = JSON.stringify(Object.assign({ action, token: State.token }, data));
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body });
    const j = await res.json();
    if (j && j.authError) { logout(true); }
    return j;
  } catch (e) { return { ok:false, error:'Network error. Check your connection.' }; }
}

/* ---------- open customer service (WhatsApp support) ---------- */

/* =====================================================================
   VIDEOS + LIVE TV — FRONTEND ENGINE (rides on eSIM/buyEsim backend)
   =====================================================================
   HOW IT WORKS (no backend/sheet changes):
   - Videos are stored as Prices rows with service='esim'. We pack the
     video's metadata (title, url, poster, category, desc) INSIDE the
     'label' field using a JSON payload prefixed with "VID::".
     -> code   = unique video id (used as buyEsim category)
     -> amount = price per view
   - Purchases call action 'buyEsim' with {category: code}. That debits
     the wallet + logs a transaction (backend logs it 'pending', but we
     treat/display it as SUCCESS because the wallet was deducted).
   - Live TV channels + subscription plans are admin-managed and stored
     in localStorage. Subscription charges also go through 'buyEsim'
     using dedicated hidden price rows (service='esim', TV:: payload).
   ===================================================================== */

const VID_PREFIX = 'VID::';
const TV_PREFIX  = 'TVPLAN::';

/* ---------- AD-BLOCK MODE (admin toggle, SHARED via backend) ---------- */
const ADBLOCK_STORE = 'siwtu_adblock_v1';   // legacy local cache (fallback only)
function adBlockOn_(){
  const cfg = (typeof tvSharedConfig_==='function') ? tvSharedConfig_() : null;
  if (cfg && typeof cfg.adblock!=='undefined') return !!cfg.adblock;
  const v = localStorage.getItem(ADBLOCK_STORE); return v===null ? true : v==='1';
}
function setAdBlock_(on){
  localStorage.setItem(ADBLOCK_STORE, on?'1':'0');
  if (typeof tvSaveSharedConfig_==='function') return tvSaveSharedConfig_({ adblock: !!on });
}

/* Parse the label payload from an esim price row. Returns {kind,meta} */
function parseExtra_(row){
  const label = String(row.label||'');
  if (label.indexOf(VID_PREFIX)===0){
    try { return { kind:'video', meta: JSON.parse(label.slice(VID_PREFIX.length)) }; } catch(e){ return null; }
  }
  if (label.indexOf(TV_PREFIX)===0){
    try { return { kind:'tvplan', meta: JSON.parse(label.slice(TV_PREFIX.length)) }; } catch(e){ return null; }
  }
  return null; // legacy esim / other items are ignored by video/tv UI
}

/* Get all videos from cfg.extraServices */
function getVideos_(){
  const rows = (State.cfg && State.cfg.extraServices) || [];
  const out = [];
  rows.forEach(r=>{
    if (String(r.service)!=='esim') return;
    if (String(r.code)==='sys_tv_config') return;   // skip shared TV system row
    const p = parseExtra_(r);
    if (p && p.kind==='video'){
      out.push(Object.assign({ code:String(r.code), price:Number(r.amount)||0 }, p.meta));
    }
  });
  return out;
}
/* Get TV subscription plans from cfg.extraServices */
function getTvPlans_(){
  const rows = (State.cfg && State.cfg.extraServices) || [];
  const out = [];
  rows.forEach(r=>{
    if (String(r.service)!=='esim') return;
    const p = parseExtra_(r);
    if (p && p.kind==='tvplan'){
      out.push(Object.assign({ code:String(r.code), price:Number(r.amount)||0 }, p.meta));
    }
  });
  // default plans if none configured
  if (!out.length){
    return [
      {code:'tv_daily',   name:'Daily',   period:'day',   price:0, _virtual:true},
      {code:'tv_weekly',  name:'Weekly',  period:'week',  price:0, _virtual:true},
      {code:'tv_monthly', name:'Monthly', period:'month', price:0, _virtual:true},
      {code:'tv_yearly',  name:'Yearly',  period:'year',  price:0, _virtual:true},
    ];
  }
  return out;
}

/* ---- Live TV settings (admin managed, SHARED via backend Prices/extraServices) ----
   We pigg-back on the existing esim Prices table so ALL users receive the same
   channels, paid/free mode and ad-block flag through the public `config` call.
   No backend changes required — these ride on adminSavePrice / config.        */
const TV_CONFIG_CODE = 'sys_tv_config';   // special esim price row holding shared JSON
const TV_STORE = 'siwtu_tv_channels_v1';     // legacy local cache (fallback only)
const TV_MODE_STORE = 'siwtu_tv_paid_v1';    // legacy local cache (fallback only)

/* Read the shared TV config object from cfg.extraServices (label holds JSON). */
function tvSharedConfig_(){
  const rows = (State.cfg && State.cfg.extraServices) || [];
  for (let i=0;i<rows.length;i++){
    const r = rows[i];
    if (String(r.service)==='esim' && String(r.code)===TV_CONFIG_CODE){
      try {
        const raw = String(r.label||'');
        const json = raw.indexOf('SYS::')===0 ? raw.slice(5) : raw;
        const obj = JSON.parse(json);
        if (obj && typeof obj==='object') return obj;
      } catch(e){}
    }
  }
  return null;
}
/* Persist the shared TV config to backend (admin only) then refresh cfg. */
async function tvSaveSharedConfig_(patch){
  const cur = tvSharedConfig_() || {};
  const next = Object.assign({ channels: null, paid: true, adblock: true }, cur, patch);
  const label = 'SYS::' + JSON.stringify(next);
  const r = await api('adminSavePrice', { price:{ id:'', service:'esim', code:TV_CONFIG_CODE, label, network:'', amount:0, active:'yes' } });
  const c = await api('config'); if (c && c.ok) State.cfg = c.config;
  return r;
}

function tvChannels_(){
  const cfg = tvSharedConfig_();
  if (cfg && Array.isArray(cfg.channels)) return cfg.channels;
  try { const a = JSON.parse(localStorage.getItem(TV_STORE)||'null'); if (Array.isArray(a)) return a; } catch(e){}
  return DEFAULT_TV.slice();
}
function saveTvChannels_(list){
  localStorage.setItem(TV_STORE, JSON.stringify(list));   // local cache for instant admin feedback
  return tvSaveSharedConfig_({ channels: list });          // shared for all users
}
function tvPaidMode_(){
  const cfg = tvSharedConfig_();
  if (cfg && typeof cfg.paid!=='undefined') return !!cfg.paid;
  const v = localStorage.getItem(TV_MODE_STORE); return v===null ? true : v==='1';
}
function setTvPaidMode_(on){
  localStorage.setItem(TV_MODE_STORE, on?'1':'0');

}

/* Build a YouTube watch id from url */
function ytId_(src){
  const s = String(src||'');
  let m = s.match(/[?&]v=([^&]+)/); if (m) return m[1];
  m = s.match(/youtu\.be\/([^?&]+)/); if (m) return m[1];
  m = s.match(/embed\/([^?&]+)/); if (m) return m[1];
  if (/^[A-Za-z0-9_-]{6,}$/.test(s)) return s;
  return '';
}
/* Build a Google Drive preview embed url from any Drive link */
function driveEmbed_(src){
  const s = String(src||'');
  let m = s.match(/\/file\/d\/([^\/]+)/); if (m) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  m = s.match(/[?&]id=([^&]+)/); if (m) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  if (s.indexOf('drive.google.com')>-1 && s.indexOf('/preview')>-1) return s;
  return '';
}

/* =====================================================================
   NEW: AD-FREE YOUTUBE EMBED BUILDER (no redirect, in-page only)
   =====================================================================
   - Uses youtube-nocookie.com privacy-enhanced domain to reduce ads/tracking
   - Disables related videos, branding & fullscreen redirect prompts
   - When ad-block mode is ON we also enable no-cookie + strict params
   ===================================================================== */
function ytEmbedUrl_(id, opts){
  opts = opts || {};
  // Always use the standard youtube.com embed host — youtube-nocookie.com
  // triggers Error 150/153 far more often. We still keep it ad-lean via params.
  const host = 'https://www.youtube.com';

  // Only send a valid http/https origin. A "null"/"file://" origin is the
  // #1 cause of "Error 153 / Video player configuration error".
  const org = (location && location.origin && /^https?:/i.test(location.origin))
    ? location.origin : '';

  const params = [
    'autoplay=1',
    'rel=0',
    'modestbranding=1',
    'playsinline=1',
    'iv_load_policy=3',   // hide annotations/overlays
    'fs=1',
    'controls=1',
    'disablekb=0',
    'enablejsapi=1',
    (opts.mute? 'mute=1':'mute=0')
  ];
  if (org){
    params.push('origin=' + encodeURIComponent(org));
    params.push('widget_referrer=' + encodeURIComponent(org));
  }
  return `${host}/embed/${encodeURIComponent(id)}?${params.join('&')}`;
}

async function boot() {
  if (API_URL.includes('PASTE_YOUR')) {
    app.innerHTML = `<div class="p-8 text-center"><h2 class="font-display text-xl font-bold text-amber-400">Setup needed</h2><p class="text-slate-400 text-sm mt-2">Paste your Google Apps Script Web App URL into <code class="text-brand-400">API_URL</code> at the top of index.html.</p></div>`;
    hideSplash();
    return;
  }
  const c = await api('config');
  State.cfg = (c && c.ok) ? c.config : { siteName:'SIWTU', services:[] };
  document.title = State.cfg.siteName + ' — Airtime & Data';
  setupWhatsApp();
  if (State.token) {
    const m = await api('me');
    if (m && m.ok) { State.user = m.user; navigate('dashboard'); startPolling(); hideSplash(); return; }
  }
  navigate('landing');
  hideSplash();
}
function setupWhatsApp(){ const wa = $('#waFloat'); if (State.cfg.whatsapp) { wa.href = 'https://wa.me/'+State.cfg.whatsapp; } }

function startPolling(){
  stopPolling();
  State.poll = setInterval(async ()=>{
    if (!State.token) return;
    const m = await api('me');
    if (m && m.ok) {
      const changed = !State.user || State.user.wallet !== m.user.wallet;
      State.user = m.user;
      document.querySelectorAll('[data-wallet]').forEach(el=>{ el.textContent = balText(m.user.wallet); });
      if (changed && State.route==='transactions') renderTransactions();
    }
    const c = await api('config'); if (c && c.ok) State.cfg = c.config;
  }, 8000);
}
function stopPolling(){ if(State.poll){ clearInterval(State.poll); State.poll=null; } }
function logout(silent){ State.token=null; State.user=null; localStorage.removeItem('vtu_token'); stopPolling(); if(!silent) toast('Logged out','info'); navigate('landing'); }

/* =====================================================================
   ROUTER
   ===================================================================== */
function navigate(route, param={}) {
  State.route = route; State.param = param;
  window.scrollTo(0,0);
  // Services removed from the customer UI (still available in backend/admin)
  const disabledRoutes = ['cable','electricity','epin','exam','esim','voucher'];
  if (disabledRoutes.includes(route)) {
    route = State.user ? 'dashboard' : 'landing';
    State.route = route;
  }
  const guarded = ['dashboard','fund','airtime','data','transactions','profile','referrals','admin','videos','livetv'];
  if (guarded.includes(route) && !State.user) { route='login'; State.route='login'; }
  const map = {
    landing:renderLanding, login:renderLogin, register:renderRegister, forgot:renderForgot,
    dashboard:renderDashboard, fund:renderFund, transactions:renderTransactions, profile:renderProfile,
    referrals:renderReferrals, airtime:()=>renderService('airtime'), data:()=>renderService('data'),
    about:renderAbout, terms:renderTerms, privacy:renderPrivacy, faq:renderFaq,
    videos:renderVideos, livetv:renderLiveTv,
    admin:renderAdmin
  };
  (map[route]||renderLanding)();
  renderTabbar();
}

  let hit = ['#94a3b8','M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2'];
  for (const k in map){ if (s.includes(k)) { hit=map[k]; break; } }

}
/* Present a friendlier service label to customers (eSIM -> the transaction detail's kind) */
function friendlyService_(t){
  const s = String(t.service||'');
  if (s.toLowerCase()==='esim'){
    let d={}; try{ d=JSON.parse(t.detail); }catch(e){}
    if (d && d.kind==='tv') return 'Live TV';
    return 'Video';
  }
  return s;
}
/* Treat esim/video/TV pending as success on the frontend (wallet already deducted) */
function displayStatus_(t){
  let st = String(t.status||'');
  const s = String(t.service||'').toLowerCase();
  if (s==='esim' && (st==='pending' || st==='processing')) return 'success';
  return st;
}
function txRow(t){
  const st = displayStatus_(t);
  const ok = st==='success', fail = st==='failed';
  const credit = t.type==='credit';
  const color = fail?'text-red-400': credit?'text-brand-400':'text-slate-100';
  const badge = ok?'text-brand-400': fail?'text-red-400':'text-amber-400';
  const svc = friendlyService_(t);
  return `<button onclick='showReceipt(${JSON.stringify(t).replace(/'/g,"&#39;")})' class="w-full card rounded-2xl p-3.5 flex items-center gap-3 text-left pressable">
    ${txIcon(svc)}
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold truncate">${esc(svc)}</p>
      <p class="text-[11px] text-slate-500">${new Date(t.createdAt).toLocaleString('en-NG',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</p>
    </div>
    <div class="text-right"><p class="text-sm font-bold ${color}">${credit?'+':'-'}${peso(t.amount)}</p><p class="text-[10px] ${badge} capitalize">${esc(st)}</p></div>
  </button>`;
}

function brandPills(list, id, onPick){
  return `<div class="grid grid-cols-4 gap-2.5" id="${id}">
    ${list.map((n,i)=>{
      const b = brandOf(n.id);
      const active = i===0;
      return `<button data-v="${n.id}" data-brand="${n.brand||brandKey(n.id)||''}" onclick="pickBrand('${id}',this)" class="brand-pill relative rounded-2xl p-2.5 flex flex-col items-center gap-1.5 transition pressable"
        style="border:1.5px solid ${active?b.ring:'rgba(255,255,255,.08)'};background:${active?b.soft:'rgba(16,22,38,.5)'}">
        ${netLogo(n.id, 30)}
        <span class="text-[10px] font-bold ${active?'text-white':'text-slate-400'}">${n.n}</span>
        <span class="check absolute top-1.5 right-1.5 w-3.5 h-3.5 rounded-full items-center justify-center ${active?'flex':'hidden'}" style="background:${b.ring}"><svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></span>
      </button>`;
    }).join('')}
  </div>`;
}
function pickBrand(group, el){
  document.querySelectorAll(`#${group} .brand-pill`).forEach(b=>{
    const bb = brandOf(b.dataset.v);
    b.style.border='1.5px solid rgba(255,255,255,.08)';
    b.style.background='rgba(16,22,38,.5)';
    b.querySelector('span.text-\\[10px\\]').className='text-[10px] font-bold text-slate-400';
    const c=b.querySelector('.check'); c.classList.add('hidden'); c.classList.remove('flex');
  });
  const b = brandOf(el.dataset.v);
  el.style.border=`1.5px solid ${b.ring}`;
  el.style.background=b.soft;
  el.querySelector('span.text-\\[10px\\]').className='text-[10px] font-bold text-white';
  const c=el.querySelector('.check'); c.classList.remove('hidden'); c.classList.add('flex'); c.style.background=b.ring;
  if(group==='dataNet'){
    CURRENT_DATA_BRAND = el.dataset.brand || brandKey(el.dataset.v) || 'mtn';
    renderDataCats(CURRENT_DATA_BRAND);
    loadDataPlans(DATA_CATEGORIES[CURRENT_DATA_BRAND].cats[0].id);
  }
  const go=$('#go'); if(go && (group==='airNet')){ go.style.background=`linear-gradient(180deg,${b.bg},${b.bg})`; go.style.color=b.fg; }
}
function pillValue(group){
  const pills=[...document.querySelectorAll(`#${group} .brand-pill`)];
  const sel=pills.find(p=>p.querySelector('.check').classList.contains('flex'));
  if(sel) return sel.dataset.v;
  const generic=document.querySelector(`#${group} .ring-2`);
  return generic?generic.dataset.v:(pills[0]?pills[0].dataset.v:null);
}

let CURRENT_DATA_BRAND = 'mtn';

function classifyDuration(label){
  const s = String(label||'').toLowerCase();
  if (/\bmonth(ly|s)?\b/.test(s)) return 'monthly';
  if (/\b(year|annual|yearly)\b/.test(s)) return 'monthly';
  if (/\b(30|31|45|60|90|120|180|360|365)\s*-?\s*day/.test(s)) return 'monthly';
  if (/\bweek(ly|s)?\b/.test(s)) return 'weekly';
  if (/\b(7|10|14|15|21)\s*-?\s*day/.test(s)) return 'weekly';
  if (/\bdaily\b/.test(s)) return 'daily';
  if (/\b(24|48|72)\s*-?\s*hour/.test(s)) return 'daily';
  if (/\b([1-6])\s*-?\s*day/.test(s)) return 'daily';
  return 'other';
}
function durationCounts(plans){
  const c = { all: plans.length, daily:0, weekly:0, monthly:0, other:0 };
  plans.forEach(p=>{ const d=classifyDuration(p.label); c[d] = (c[d]||0)+1; });
  return c;
}

let DATA_SELECTED=null;
async function loadDataPlans(net){
  const box=$('#plans'); if(!box) return; box.innerHTML=skeletonRows(4);
  CURRENT_DATA_NET = net;
  const r = await api('dataPlans',{network:net});
  if(!r.ok){
    CURRENT_DATA_PLANS = [];
    renderDurationPills({ all:0, daily:0, weekly:0, monthly:0 });
    box.innerHTML=`<div class="card rounded-2xl text-red-400 text-sm py-6 text-center">${esc(r.error||'Failed')}</div>`;
    return;
  }
  CURRENT_DATA_PLANS = r.plans || [];
  CURRENT_DATA_DURATION = 'all';
  renderDurationPills(durationCounts(CURRENT_DATA_PLANS));
  renderDataPlanList();
}
function renderDataPlanList(){
  const box=$('#plans'); if(!box) return;
  const net=CURRENT_DATA_NET;
  const b=brandOf(net);
  let list = CURRENT_DATA_PLANS.slice();
  if(CURRENT_DATA_DURATION!=='all'){
    list = list.filter(p=>classifyDuration(p.label)===CURRENT_DATA_DURATION);
  }
  if(!list.length){
    const lbl = CURRENT_DATA_DURATION==='all' ? '' : CURRENT_DATA_DURATION;
    box.innerHTML = `<div class="card rounded-2xl py-8 text-center text-slate-500 text-sm">No ${esc(lbl)} plans found${CURRENT_DATA_DURATION!=='all'?'. Try another duration.':''}</div>`;

}

function openVideo(v){
  if(videoOwned_(v.code)){ return playVideo(v); }
  modal(`<div class="flex items-center gap-3 mb-4">
      <span class="w-12 h-12 rounded-xl bg-fuchsia-600/20 flex items-center justify-center"><svg class="w-6 h-6 text-fuchsia-400" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
      <div><h3 class="font-display font-bold text-lg leading-tight">${esc(v.title||'Video')}</h3><p class="text-xs text-slate-400 capitalize">${esc(v.cat||'video')}</p></div>
    </div>
    ${v.desc?`<p class="text-sm text-slate-400 mb-3">${esc(v.desc)}</p>`:''}
    <div class="card rounded-2xl p-4 flex justify-between items-center mb-4"><span class="text-slate-400 text-sm">Price</span><span class="font-bold text-fuchsia-400 text-lg">${peso(v.price)}</span></div>
    <button id="pv" class="w-full btn-primary rounded-xl py-3.5 font-bold">Pay ${peso(v.price)} & Watch</button>
    <p class="text-[11px] text-slate-500 text-center mt-3">Amount will be deducted from your wallet.</p>`);
  $('#pv').onclick = async (e)=>{
    btnLoad(e.target);
    const r = await api('buyEsim',{ category: v.code });
    btnLoad(e.target,false);
    if(r && r.ok){
      if(typeof r.balance!=='undefined'){ State.user.wallet=r.balance; document.querySelectorAll('[data-wallet]').forEach(el=>{ el.textContent=balText(r.balance); }); }
      markVideoOwned_(v.code);
      closeModal();
      toast('Payment successful','ok');
      playVideo(v);
    } else {
      toast((r&&r.error)||'Payment failed','err');
    }
  };
}
function playVideo(v){
  const drive = driveEmbed_(v.url);
  let player;
  if(drive){
    player = `<iframe src="${esc(drive)}" allow="autoplay; encrypted-media" allowfullscreen referrerpolicy="no-referrer"></iframe>`;
  } else if(/youtu/.test(String(v.url))){
    const id = ytId_(v.url);
    player = `<iframe src="${esc(ytEmbedUrl_(id,{mute:false}))}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="origin"></iframe>`;
  } else if(/\.m3u8($|\?)/.test(String(v.url))){
    player = `<video id="hlsVid" controls autoplay playsinline></video>`;
  } else {
    player = `<video controls autoplay playsinline src="${esc(v.url)}"></video>`;
  }
  modal(`<div class="mb-3"><h3 class="font-display font-bold text-lg leading-tight">${esc(v.title||'Now playing')}</h3><p class="text-xs text-brand-400 mt-0.5">▶ Playing on ${esc(State.cfg.siteName||'SIWTU')}${adBlockOn_()?' • Ad-free':''}</p></div>
    <div class="aspect-video-box shadow-soft">${player}</div>
    <button onclick="closeModal()" class="w-full glass rounded-xl py-3 font-semibold mt-4 pressable">Close player</button>`);
  // attach hls if needed
  if(/\.m3u8($|\?)/.test(String(v.url))){ attachHls_($('#hlsVid'), v.url); }
}

function playChannel(c){
  let player;
  if(String(c.type)==='hls' || /\.m3u8($|\?)/.test(String(c.src))){
    player = `<video id="hlsVid" controls autoplay playsinline></video>`;
  } else {

  }
  modal(`<div class="mb-3 flex items-center gap-2">

    </div>
    <div class="aspect-video-box shadow-soft">${player}</div>
    <p class="text-[11px] text-slate-500 mt-2 text-center">If a channel does not load, its provider may have changed the stream. Try another channel.</p>
    <button onclick="closeModal()" class="w-full glass rounded-xl py-3 font-semibold mt-3 pressable">Close player</button>`);
  if(String(c.type)==='hls' || /\.m3u8($|\?)/.test(String(c.src))){ attachHls_($('#hlsVid'), c.src); }
}
/* Attach HLS.js (or native HLS on Safari) to a <video> */
function attachHls_(video, src){
  if(!video) return;
  try{ if(window._hls){ window._hls.destroy(); window._hls=null; } }catch(e){}
  if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = src; video.play().catch(()=>{}); return;
  }
  if(window.Hls && Hls.isSupported()){
    const hls = new Hls({ lowLatencyMode:true });
    window._hls = hls;
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (evt,data)=>{ if(data && data.fatal){ toast('Stream unavailable right now','err'); } });
  } else {
    video.src = src; video.play().catch(()=>{});
  }
}

function downloadReceipt(t){
  let detail={}; try{ detail=JSON.parse(t.detail);}catch(e){}
  const { jsPDF }=window.jspdf; const doc=new jsPDF({unit:'mm',format:[80,140]});
  let y=12; doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text(State.cfg.siteName,40,y,{align:'center'});
  y+=6; doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.text('Transaction Receipt',40,y,{align:'center'});
  y+=4; doc.setDrawColor(200); doc.line(8,y,72,y); y+=7;
  const line=(k,v)=>{ doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(110); doc.text(k,8,y); doc.setFont('helvetica','bold'); doc.setTextColor(20); doc.text(String(v),72,y,{align:'right'}); y+=6; };
  line('Service',friendlyService_(t)); line('Amount',peso(t.amount)); line('Status',displayStatus_(t)); line('Reference',t.reference||'—');
  line('Date',new Date(t.createdAt).toLocaleString('en-NG'));
  Object.keys(detail).filter(k=>typeof detail[k]!=='object' && k!=='kind').forEach(k=>line(k,detail[k]));
  y+=4; doc.line(8,y,72,y); y+=6; doc.setFont('helvetica','italic'); doc.setFontSize(7); doc.setTextColor(120); doc.text('Thank you for your patronage',40,y,{align:'center'});
  doc.save('receipt_'+(t.reference||t.id)+'.pdf');
}

    <label class="text-xs text-slate-400">Service type</label>
    <select id="psvc" class="field mt-1">${['epin','exam','voucher'].map(s=>`<option ${p.service===s?'selected':''}>${s}</option>`).join('')}</select>
    <label class="text-xs text-slate-400 mt-3 block">Label (shown to user)</label>
    <input id="plabel" value="${esc(p.label)}" placeholder="e.g. WAEC Result Checker" class="field mt-1" />
    <label class="text-xs text-slate-400 mt-3 block">Code (internal id)</label>
    <input id="pcode" value="${esc(p.code)}" placeholder="e.g. waec" class="field mt-1" />
    <label class="text-xs text-slate-400 mt-3 block">Price (₦)</label>
    <input id="pamt" type="number" value="${esc(p.amount)}" class="field mt-1" />
    <button id="sv" class="w-full btn-primary rounded-xl py-3 font-bold mt-4">Save</button>`);
  $('#sv').onclick=async(e)=>{ btnLoad(e.target);
    const r=await api('adminSavePrice',{price:{id:p.id||'',service:$('#psvc').value,code:$('#pcode').value.trim(),label:$('#plabel').value.trim(),amount:Number($('#pamt').value),active:'yes'}});
    btnLoad(e.target,false);
    if(r.ok){ closeModal(); toast('Saved','ok'); admRender(); } else toast(r.error,'err'); };
}
async function admDelPrice(id){ const r=await api('adminDeletePrice',{id}); if(r.ok){toast('Deleted','ok');admRender();} else toast(r.error,'err'); }

/* ---- Labels ---- */
const LABEL_SERVICES = [['data','Data']];
let labelSvc='data';
async function admLabels(body){
  body.innerHTML=`
    <div class="flex gap-2 mb-4" id="labSvc">
      ${LABEL_SERVICES.map(s=>`<button onclick="admLabelSvc('${s[0]}')" data-s="${s[0]}" class="px-4 py-2 rounded-xl text-sm font-semibold ${labelSvc===s[0]?'btn-primary':'glass'}">${s[1]}</button>`).join('')}
    </div>
    <p class="text-[11px] text-slate-500 mb-3">Load a service's live plans first so its plan codes appear here, then set a custom display name. Customers see your custom name; the website still buys the exact original plan. Leave blank to show the original Peyflex text.</p>
    <div class="card rounded-2xl p-3 mb-4">
      <p class="text-xs text-slate-400 mb-2">Fetch latest plans into the label list:</p>
      <div class="grid grid-cols-2 gap-2" id="labFetch"></div>
    </div>
    <input id="labSearch" oninput="admFilterLabels()" placeholder="Search original or custom text" class="field mb-3" />
    <div id="labList" class="space-y-2"><div class="text-slate-500 text-center py-8 text-sm">Loading…</div></div>`;
  buildLabelFetchButtons();
  await loadLabels();
}
function admLabelSvc(s){
  labelSvc=s;
  document.querySelectorAll('#labSvc button').forEach(b=>b.className=`px-4 py-2 rounded-xl text-sm font-semibold ${b.dataset.s===s?'btn-primary':'glass'}`);
  buildLabelFetchButtons();
  loadLabels();
}
function buildLabelFetchButtons(){
  const box=$('#labFetch'); if(!box) return;
  box.innerHTML = NET_DATA.map(n=>`<button onclick="fetchPlansForLabels('data','${n.id}')" class="glass rounded-lg py-2 text-xs font-semibold">${n.n}</button>`).join('');
}
async function fetchPlansForLabels(svc, net){
  toast('Fetching latest plans…','info');
  let r = await api('dataPlans',{network:net});
  if(r && r.ok){ toast('Plans synced. Listing labels…','ok'); await loadLabels(); }
  else toast((r&&r.error)||'Could not fetch plans','err');
}
async function loadLabels(){
  const box=$('#labList'); if(!box) return;
  box.innerHTML=`<div class="text-slate-500 text-center py-8 text-sm">Loading…</div>`;
  const r=await api('adminLabels',{service:labelSvc});
  if(!r.ok){ box.innerHTML=`<p class="text-red-400 text-center py-6 text-sm">${esc(r.error)}</p>`; return; }
  window._labels=r.labels;
  admFilterLabels();
}
function admFilterLabels(){
  const box=$('#labList'); if(!box) return;
  const q=($('#labSearch')?.value||'').toLowerCase();
  const list=(window._labels||[]).filter(l=>!q||`${l.original} ${l.custom}`.toLowerCase().includes(q));
  if(!list.length){ box.innerHTML=`<div class="card rounded-2xl py-8 text-center text-slate-500 text-sm">No plans yet. Use the buttons above to fetch a network's plans first.</div>`; return; }
  box.innerHTML=list.map(l=>`<div class="card rounded-2xl p-4">
    <p class="text-[10px] text-slate-500 uppercase tracking-wide">Peyflex original</p>
    <p class="text-xs font-mono text-slate-300 break-words">${esc(l.original)}</p>
    <p class="text-[10px] text-slate-500 mt-2 mb-1">Custom name shown to customers</p>
    <input id="lab_${l.id}" value="${esc(l.custom||'')}" placeholder="(blank = show original)" class="field" />
    <div class="grid grid-cols-2 gap-2 mt-2">
      <button onclick="admSaveLabel('${esc(l.id)}','${esc(l.service)}','${esc(String(l.plan_code).replace(/'/g,"\\'"))}')" class="btn-primary rounded-lg py-2 text-xs font-semibold">Save</button>
      <button onclick="admClearLabel('${esc(l.service)}','${esc(String(l.plan_code).replace(/'/g,"\\'"))}','${esc(l.id)}')" class="bg-red-600/20 text-red-300 rounded-lg py-2 text-xs font-semibold">Reset to original</button>
    </div>
  </div>`).join('');
}
async function admSaveLabel(id, service, plan_code){
  const inp=$('#lab_'+id); const custom=inp?inp.value.trim():'';
  let original='';
  (window._labels||[]).forEach(l=>{ if(l.id===id) original=l.original; });
  const r=await api('adminSaveLabel',{label:{service,plan_code,custom,original}});
  if(r.ok){ toast('Display name saved','ok'); (window._labels||[]).forEach(l=>{ if(l.id===id) l.custom=custom; }); } else toast(r.error||'Failed','err');
}
async function admClearLabel(service, plan_code, id){
  const r=await api('adminDeleteLabel',{service,plan_code});
  if(r.ok){ toast('Reset to original','ok'); (window._labels||[]).forEach(l=>{ if(l.id===id) l.custom=''; }); admFilterLabels(); } else toast(r.error||'Failed','err');
}

async function admStock(body){
  const r=await api('adminStock'); if(!r.ok) return body.innerHTML=`<p class="text-red-400">${esc(r.error)}</p>`;
  body.innerHTML=`<button onclick="admAddStock()" class="w-full btn-primary rounded-xl py-3 font-bold mb-4">+ Add PIN stock</button>
    <div class="space-y-2">${r.stock.map(s=>`<div class="card rounded-2xl p-4 flex justify-between items-center">
      <div><p class="text-sm font-semibold capitalize">${esc(s.service)} · ${esc(s.category)}</p><p class="text-xs text-slate-500">${s.sold} sold</p></div>
      <span class="font-bold ${s.available>0?'text-brand-400':'text-red-400'}">${s.available} left</span></div>`).join('')||`<p class="text-slate-500 text-center py-6 text-sm">No stock yet</p>`}</div>
    <p class="text-[11px] text-slate-500 mt-4">PINs entered here are sold to users for ePIN, Exam PIN and printable Vouchers. One PIN per line, or "PIN,Serial" per line.</p>`;
}
function admAddStock(){
  modal(`<h3 class="font-display font-bold text-lg mb-4">Add PIN stock</h3>
    <label class="text-xs text-slate-400">Service</label>
    <select id="ssvc" class="field mt-1">${['voucher','epin','exam'].map(s=>`<option>${s}</option>`).join('')}</select>
    <label class="text-xs text-slate-400 mt-3 block">Category / code (match a Price code)</label>
    <input id="scat" placeholder="e.g. mtn100 or waec" class="field mt-1" />
    <label class="text-xs text-slate-400 mt-3 block">Face value (₦)</label>
    <input id="samt" type="number" class="field mt-1" />
    <label class="text-xs text-slate-400 mt-3 block">PINs (one per line, "PIN,Serial")</label>
    <textarea id="spins" rows="6" placeholder="123456789012,SN001
234567890123,SN002" class="field mt-1 font-mono text-xs"></textarea>
    <button id="sv" class="w-full btn-primary rounded-xl py-3 font-bold mt-4">Add stock</button>`);
  $('#sv').onclick=async(e)=>{ btnLoad(e.target);
    const r=await api('adminAddStock',{service:$('#ssvc').value,category:$('#scat').value.trim(),amount:Number($('#samt').value),pins:$('#spins').value});
    btnLoad(e.target,false);
    if(r.ok){ closeModal(); toast(r.message,'ok'); admRender(); } else toast(r.error,'err'); };
}

async function admSettings(body){
  const r=await api('adminSettings'); if(!r.ok) return body.innerHTML=`<p class="text-red-400">${esc(r.error)}</p>`;
  const s=r.settings;
  const field=(k,label,type='text',hint='')=>`<div><label class="text-xs text-slate-400">${label}</label>
    <input id="set_${k}" type="${type}" value="${esc(s[k]||'')}" class="field mt-1" />${hint?`<p class="text-[10px] text-slate-500 mt-1">${hint}</p>`:''}</div>`;
  body.innerHTML=`<div class="space-y-4">
    <div class="card rounded-2xl p-4 flex items-center justify-between">
      <div><p class="text-sm font-bold text-brand-400">Block Ads (Videos & Live TV)</p><p class="text-[11px] text-slate-500">Ad-free, no-redirect playback for everyone.</p></div>
      <button onclick="admToggleAdBlock()" class="relative w-16 h-8 rounded-full transition ${adBlockOn_()?'bg-brand-500':'bg-slate-600'}">
        <span class="absolute top-1 ${adBlockOn_()?'right-1':'left-1'} w-6 h-6 rounded-full bg-white transition"></span>
      </button>
    </div>
    <div class="card rounded-2xl p-4 space-y-3">
      <p class="text-sm font-bold text-brand-400">API Keys</p>
      ${field('PEYFLEX_KEY','Peyflex API Token')}
      ${field('PAYSTACK_PUBLIC','Paystack Public Key')}
      ${field('PAYSTACK_SECRET','Paystack Secret Key','password','Stays server-side. Leave unchanged to keep current.')}
      ${field('ADMIN_PASSWORD','Command Centre Password','password')}
    </div>
    <div class="card rounded-2xl p-4 space-y-3">
      <p class="text-sm font-bold text-brand-400">Business</p>
      ${field('SITE_NAME','Website / Business Name')}
      ${field('WHATSAPP','Support WhatsApp (e.g. 2348012345678)')}
      ${field('MIN_FUND','Minimum funding (₦)','number')}
    </div>
    <div class="card rounded-2xl p-4 space-y-3">
      <p class="text-sm font-bold text-brand-400">Margins & Rewards</p>
      ${field('AIRTIME_DISCOUNT','Airtime discount to users (%)','number')}
      ${field('DATA_MARKUP','Data markup (%)','number')}
      ${field('CABLE_MARKUP','Cable markup (%)','number')}
      ${field('ELEC_FEE','Electricity flat fee (₦)','number')}
      ${field('REFERRAL_BONUS','Referral bonus (₦)','number')}
    </div>
    <button id="save" class="w-full btn-primary rounded-xl py-3.5 font-bold">Save all settings</button>
  </div>`;
  $('#save').onclick=async(e)=>{
    btnLoad(e.target);
    const keys=['PEYFLEX_KEY','PAYSTACK_PUBLIC','PAYSTACK_SECRET','ADMIN_PASSWORD','SITE_NAME','WHATSAPP','MIN_FUND','AIRTIME_DISCOUNT','DATA_MARKUP','CABLE_MARKUP','ELEC_FEE','REFERRAL_BONUS'];
    const settings={}; keys.forEach(k=>{ const v=$('#set_'+k).value; if(!((k==='PAYSTACK_SECRET'||k==='ADMIN_PASSWORD')&&v==='')) settings[k]=v; });
    const r=await api('adminSaveSettings',{settings});
    btnLoad(e.target,false);
    if(r.ok){ toast('Settings saved','ok'); const c=await api('config'); if(c.ok) State.cfg=c.config; setupWhatsApp(); } else toast(r.error,'err');
  };
}
async function admTx(body){
  const r=await api('adminTx'); if(!r.ok) return body.innerHTML=`<p class="text-red-400">${esc(r.error)}</p>`;
  body.innerHTML=`<div class="space-y-2">${r.transactions.map(t=>{ const st=displayStatus_(t); const svc=friendlyService_(t); return `<div class="card rounded-2xl p-3.5">
    <div class="flex justify-between items-center">
      <div class="min-w-0"><p class="text-sm font-semibold truncate">${esc(svc)}</p><p class="text-[11px] text-slate-500 truncate">${esc(t.email)}</p></div>
      <div class="text-right shrink-0 ml-2"><p class="font-bold text-sm ${t.type==='credit'?'text-brand-400':''}">${peso(t.amount)}</p>
        <p class="text-[10px] capitalize ${st==='failed'?'text-red-400':st==='success'?'text-brand-400':'text-amber-400'}">${esc(st)}</p></div>
    </div>
    ${t.status==='failed'?`<button onclick="admRefund('${t.id}')" class="mt-2 w-full bg-brand-600/20 text-brand-300 rounded-lg py-1.5 text-xs font-semibold">Refund to wallet</button>`:''}
  </div>`; }).join('')||`<p class="text-slate-500 text-center py-8 text-sm">No transactions</p>`}</div>`;
}
async function admRefund(id){ const r=await api('adminRefund',{id}); if(r.ok){toast(r.message,'ok');admRender();} else toast(r.error,'err'); }

/* ===================================================================== */
boot();
</script>
</body>
